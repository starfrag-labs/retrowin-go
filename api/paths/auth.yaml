# Auth endpoints
/auth/login:
  get:
    operationId: initiateLogin
    summary: Initiate login
    description: Start OIDC login flow and return authorization URL
    tags:
      - Auth
    security: []
    responses:
      '200':
        description: Login initiated
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/LoginResponse"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/auth/callback:
  get:
    operationId: handleCallback
    summary: Handle OAuth callback
    description: Handle OAuth callback from Keycloak
    tags:
      - Auth
    security: []
    parameters:
      - name: code
        in: query
        required: true
        schema:
          type: string
        description: Authorization code from Keycloak
      - name: state
        in: query
        required: true
        schema:
          type: string
        description: OAuth state parameter for CSRF protection
      - name: session_state
        in: query
        schema:
          type: string
        description: Session state from Keycloak
      - name: iss
        in: query
        schema:
          type: string
        description: Issuer URL
    responses:
      '200':
        description: Authentication successful
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/CallbackResponse"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/auth/logout:
  post:
    operationId: logout
    summary: Logout
    description: Logout and delete session (idempotent - always returns 204)
    tags:
      - Auth
    security: []
    responses:
      '204':
        description: Logout successful
