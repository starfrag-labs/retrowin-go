/syscall/{systemId}/rename:
  post:
    operationId: rename
    summary: Rename file or directory
    description: Rename a file or directory within the same parent directory (renameat)
    tags:
      - Syscall
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/inode.yaml#/RenameRequest"
    responses:
      '200':
        description: Renamed successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/inode.yaml#/InodeResponse"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Source path not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '409':
        description: Destination already exists
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/syscall/{systemId}/unlink:
  delete:
    operationId: unlink
    summary: Delete file or directory
    description: Delete a file or directory at the specified path (unlinkat)
    tags:
      - Syscall
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
      - name: path
        in: query
        required: true
        schema:
          type: string
        description: Path to delete
    responses:
      '204':
        description: Deleted
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Path not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/syscall/{systemId}/rm:
  post:
    operationId: rm
    summary: Remove multiple paths
    description: Remove files or directories (like Unix rm). Accepts multiple paths for bulk deletion.
    tags:
      - Syscall
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/inode.yaml#/RmRequest"
    responses:
      '200':
        description: Removal results
        content:
          application/json:
            schema:
              $ref: "../schemas/inode.yaml#/RmResult"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/syscall/{systemId}/mv:
  post:
    operationId: mv
    summary: Move paths
    description: |
      Move files or directories (like Unix mv). Accepts multiple sources with a single destination.
      If destination is a directory, all sources are moved into it.
      If destination is a new path, source is renamed/moved.
    tags:
      - Syscall
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/inode.yaml#/MvRequest"
    responses:
      '200':
        description: Move results
        content:
          application/json:
            schema:
              $ref: "../schemas/inode.yaml#/MvResult"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
