# Syscall endpoints - Dentry manipulation operations

/syscall/{systemId}/ls:
  get:
    operationId: ls
    summary: List directory contents
    description: List contents of a directory (like Unix ls command, getdents64)
    tags:
      - Syscall
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
      - name: path
        in: query
        required: true
        schema:
          type: string
        description: Directory path
    responses:
      '200':
        description: Directory contents
        content:
          application/json:
            schema:
              $ref: "../schemas/inode.yaml#/DirContentResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Directory not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/syscall/{systemId}/mkdir:
  post:
    operationId: mkdir
    summary: Create directory
    description: Create a new directory at the specified path (mkdirat)
    tags:
      - Syscall
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/inode.yaml#/MkdirRequest"
    responses:
      '201':
        description: Directory created
        content:
          application/json:
            schema:
              $ref: "../schemas/inode.yaml#/InodeResponse"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '409':
        description: Path already exists
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

