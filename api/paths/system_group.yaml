# System Group endpoints
/systems/{systemId}/groups:
  post:
    operationId: createSystemGroup
    summary: Create a group
    description: Create a new group in a system
    tags:
      - SystemGroup
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/system_group.yaml#/CreateSystemGroupRequest"
    responses:
      '201':
        description: Group created
        content:
          application/json:
            schema:
              $ref: "../schemas/system_group.yaml#/SystemGroupResponse"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: System not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '409':
        description: Group already exists
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
  get:
    operationId: listSystemGroups
    summary: List groups in system
    description: Get all groups in a system
    tags:
      - SystemGroup
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    responses:
      '200':
        description: List of system groups
        content:
          application/json:
            schema:
              $ref: "../schemas/system_group.yaml#/SystemGroupListResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: System not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/systems/{systemId}/groups/{gid}:
  get:
    operationId: getSystemGroup
    summary: Get system group by GID
    description: Get detailed information about a system group
    tags:
      - SystemGroup
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
      - name: gid
        in: path
        required: true
        schema:
          type: integer
          format: int32
        description: UNIX group ID
    responses:
      '200':
        description: System group information
        content:
          application/json:
            schema:
              $ref: "../schemas/system_group.yaml#/SystemGroupResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Group not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
  delete:
    operationId: deleteSystemGroup
    summary: Delete a group
    description: Delete a group from a system
    tags:
      - SystemGroup
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
      - name: gid
        in: path
        required: true
        schema:
          type: integer
          format: int32
        description: UNIX group ID
    responses:
      '204':
        description: Group deleted
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Group not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/systems/{systemId}/groups/{gid}/members/{uid}:
  post:
    operationId: addGroupMember
    summary: Add user to group
    description: Add a user to a group
    tags:
      - SystemGroup
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
      - name: gid
        in: path
        required: true
        schema:
          type: integer
          format: int32
        description: UNIX group ID
      - name: uid
        in: path
        required: true
        schema:
          type: integer
          format: int32
        description: UNIX user ID
    responses:
      '204':
        description: User added to group
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Group or user not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
  delete:
    operationId: removeGroupMember
    summary: Remove user from group
    description: Remove a user from a group
    tags:
      - SystemGroup
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
      - name: gid
        in: path
        required: true
        schema:
          type: integer
          format: int32
        description: UNIX group ID
      - name: uid
        in: path
        required: true
        schema:
          type: integer
          format: int32
        description: UNIX user ID
    responses:
      '204':
        description: User removed from group
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Group or user not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
