# System endpoints
/systems:
  post:
    operationId: createSystem
    summary: Create a new system
    description: Create a new system with root user and directories
    tags:
      - System
    security:
      - sessionAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/system.yaml#/CreateSystemRequest"
    responses:
      '201':
        description: System created
        content:
          application/json:
            schema:
              $ref: "../schemas/system.yaml#/SystemResponse"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
  get:
    operationId: listSystems
    summary: List all systems
    description: Get a list of all systems
    tags:
      - System
    security:
      - sessionAuth: []
    responses:
      '200':
        description: List of systems
        content:
          application/json:
            schema:
              $ref: "../schemas/system.yaml#/SystemListResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/systems/{systemId}:
  get:
    operationId: getSystem
    summary: Get system by ID
    description: Get detailed information about a system
    tags:
      - System
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    responses:
      '200':
        description: System information
        content:
          application/json:
            schema:
              $ref: "../schemas/system.yaml#/SystemResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: System not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
