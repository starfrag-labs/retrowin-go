# User endpoints
/user:
  get:
    operationId: getUser
    summary: Get current user
    description: Get the current user information
    tags:
      - User
    security:
      - sessionAuth: []
    responses:
      '200':
        description: User found
        content:
          application/json:
            schema:
              $ref: "../schemas/user.yaml#/UserResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: User not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

  delete:
    operationId: deleteUser
    summary: Delete user
    description: Delete the current user
    tags:
      - User
    security:
      - sessionAuth: []
    responses:
      '204':
        description: User deleted
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: User not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
