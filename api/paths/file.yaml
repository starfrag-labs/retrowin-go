# Health endpoint
/health:
  get:
    operationId: getHealth
    summary: Health check
    description: Check if the service is healthy
    tags:
      - Health
    security: []
    responses:
      '200':
        description: Service is healthy
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/HealthStatus"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

# File endpoints
/file/root:
  get:
    operationId: getRootContainer
    summary: Get root container
    description: Get the root container for the current user
    tags:
      - File
    security:
      - sessionAuth: []
    responses:
      '200':
        description: Root container
        content:
          application/json:
            schema:
              $ref: "../schemas/file.yaml#/FileResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Root container not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

