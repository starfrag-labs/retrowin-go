paths:
  /file/root:
    get:
      operationId: getRootContainer
      summary: Get root container
      description: Get the root container for the current member
      tags:
        - File
      security:
        - memberAuth: []
      responses:
        '200':
          description: Root container
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Root container not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/home:
    get:
      operationId: getHomeContainer
      summary: Get home container
      description: Get the home container for the current member
      tags:
        - File
      security:
        - memberAuth: []
      responses:
        '200':
          description: Home container
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Home container not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/trash:
    get:
      operationId: getTrashContainer
      summary: Get trash container
      description: Get the trash container for the current member
      tags:
        - File
      security:
        - memberAuth: []
      responses:
        '200':
          description: Trash container
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trash container not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/info/{fileKey}:
    get:
      operationId: getFileInfo
      summary: Get file information
      description: Get detailed information about a file
      tags:
        - File
      security:
        - memberAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
      responses:
        '200':
          description: File information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/children/{fileKey}:
    get:
      operationId: getFileChildren
      summary: Get file children
      description: Get all children of a container
      tags:
        - File
      security:
        - memberAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Container file key (UUID)
      responses:
        '200':
          description: List of children files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file:
    post:
      operationId: createFile
      summary: Create a new file or container
      description: Create a new file or container in a parent container
      tags:
        - File
      security:
        - memberAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: File created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Parent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/{fileKey}:
    patch:
      operationId: updateFile
      summary: Update file metadata
      description: Update file name or other metadata
      tags:
        - File
      security:
        - memberAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileRequest'
      responses:
        '200':
          description: File updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      operationId: deleteFile
      summary: Delete file
      description: Move file to trash or permanently delete
      tags:
        - File
      security:
        - memberAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
        - name: permanent
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Permanently delete (bypass trash)
      responses:
        '204':
          description: File deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/{fileKey}/move:
    post:
      operationId: moveFile
      summary: Move file to another container
      description: Move a file to a different container
      tags:
        - File
      security:
        - memberAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveFileRequest'
      responses:
        '200':
          description: File moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/{fileKey}/copy:
    post:
      operationId: copyFile
      summary: Copy file to another container
      description: Copy a file to a different container
      tags:
        - File
      security:
        - memberAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyFileRequest'
      responses:
        '201':
          description: File copied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
