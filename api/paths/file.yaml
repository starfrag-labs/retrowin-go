/file/info/{fileKey}:
  get:
    operationId: getFileInfo
    summary: Get file information
    description: Get detailed information about a file
    tags:
      - File
    security:
      - sessionAuth: []
    parameters:
      - name: fileKey
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: File key (UUID)
    responses:
      '200':
        description: File information
        content:
          application/json:
            schema:
              $ref: "../schemas/file.yaml#/FileResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: File not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/file/children/{fileKey}:
  get:
    operationId: getFileChildren
    summary: Get file children
    description: Get all children of a container
    tags:
      - File
    security:
      - sessionAuth: []
    parameters:
      - name: fileKey
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Container file key (UUID)
    responses:
      '200':
        description: List of children files
        content:
          application/json:
            schema:
              $ref: "../schemas/file.yaml#/FileListResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: File not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/file:
  post:
    operationId: createFile
    summary: Create a new file or container
    description: Create a new file or container in a parent container
    tags:
      - File
    security:
      - sessionAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/file.yaml#/CreateFileRequest"
    responses:
      '201':
        description: File created
        content:
          application/json:
            schema:
              $ref: "../schemas/file.yaml#/FileResponse"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Parent not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/file/{fileKey}:
  patch:
    operationId: updateFile
    summary: Update file metadata
    description: Update file name or other metadata
    tags:
      - File
    security:
      - sessionAuth: []
    parameters:
      - name: fileKey
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: File key (UUID)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/file.yaml#/UpdateFileRequest"
    responses:
      '200':
        description: File updated
        content:
          application/json:
            schema:
              $ref: "../schemas/file.yaml#/FileResponse"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: File not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

  delete:
    operationId: deleteFile
    summary: Delete file
    description: Move file to trash or permanently delete
    tags:
      - File
    security:
      - sessionAuth: []
    parameters:
      - name: fileKey
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: File key (UUID)
      - name: permanent
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: Permanently delete (bypass trash)
    responses:
      '204':
        description: File deleted
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: File not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

