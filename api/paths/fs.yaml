/fs/{systemId}/unlink:
  delete:
    operationId: unlink
    summary: Delete file or directory
    description: Delete a file or directory at the specified path
    tags:
      - Fs
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
      - name: path
        in: query
        required: true
        schema:
          type: string
        description: Path to delete
    responses:
      '204':
        description: Deleted
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
