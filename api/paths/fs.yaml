# Filesystem endpoints - Path-based access

/fs/{systemId}/root:
  get:
    operationId: getRootDirectory
    summary: Get root directory
    description: Get the root directory inode for a system
    tags:
      - Fs
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    responses:
      '200':
        description: Root directory inode
        content:
          application/json:
            schema:
              $ref: "../schemas/inode.yaml#/InodeResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Root directory not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/fs/{systemId}/stat:
  get:
    operationId: statPath
    summary: Get inode by path
    description: Get inode metadata for a given path
    tags:
      - Fs
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
      - name: path
        in: query
        required: true
        schema:
          type: string
        description: File path (e.g., /home/user/file.txt)
    responses:
      '200':
        description: Inode metadata
        content:
          application/json:
            schema:
              $ref: "../schemas/inode.yaml#/InodeResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Path not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/fs/{systemId}/ls:
  get:
    operationId: ls
    summary: List directory contents
    description: List contents of a directory (like Unix ls command)
    tags:
      - Fs
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
      - name: path
        in: query
        required: true
        schema:
          type: string
        description: Directory path
    responses:
      '200':
        description: Directory contents
        content:
          application/json:
            schema:
              $ref: "../schemas/inode.yaml#/DirContentResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Directory not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/fs/{systemId}/mkdir:
  post:
    operationId: mkdir
    summary: Create directory
    description: Create a new directory at the specified path
    tags:
      - Fs
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/inode.yaml#/MkdirRequest"
    responses:
      '201':
        description: Directory created
        content:
          application/json:
            schema:
              $ref: "../schemas/inode.yaml#/InodeResponse"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '409':
        description: Path already exists
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

