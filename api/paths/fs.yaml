/fs/{systemId}/rename:
  post:
    operationId: rename
    summary: Rename file or directory
    description: Rename a file or directory within the same parent directory
    tags:
      - Fs
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/inode.yaml#/RenameRequest"
    responses:
      '200':
        description: Renamed successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/inode.yaml#/InodeResponse"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '403':
        description: Access denied
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: Source path not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '409':
        description: Destination already exists
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

