# Health endpoints
/health:
  get:
    operationId: getHealth
    summary: Health check
    description: Check if the service is healthy
    tags:
      - Health
    security: []
    responses:
      "200":
        description: Service is healthy
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/HealthStatus"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
