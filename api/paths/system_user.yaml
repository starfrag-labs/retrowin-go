# System User endpoints
/systems/{systemId}/users:
  post:
    operationId: createSystemUser
    summary: Add user to system
    description: |
      Add a user to a system.

      UID assignment:
      - If uid is -1 or not provided: Auto-assigned starting from 1000
      - If uid is 0: Creates root user (superuser) - typically only for system initialization
      - If uid is 1-999: Reserved for system users (e.g., daemon accounts)
      - If uid is 1000+: Regular user with explicit UID

      A private group with the same GID as UID is automatically created.
    tags:
      - SystemUser
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/system_user.yaml#/CreateSystemUserRequest"
    responses:
      '201':
        description: User added to system
        content:
          application/json:
            schema:
              $ref: "../schemas/system_user.yaml#/SystemUserResponse"
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: System not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '409':
        description: User already exists in system
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
  get:
    operationId: listSystemUsers
    summary: List users in system
    description: Get all users in a system
    tags:
      - SystemUser
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
    responses:
      '200':
        description: List of system users
        content:
          application/json:
            schema:
              $ref: "../schemas/system_user.yaml#/SystemUserListResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: System not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"

/systems/{systemId}/users/{uid}:
  get:
    operationId: getSystemUser
    summary: Get system user by UID
    description: Get detailed information about a system user
    tags:
      - SystemUser
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
      - name: uid
        in: path
        required: true
        schema:
          type: integer
          format: int32
        description: UNIX user ID
    responses:
      '200':
        description: System user information
        content:
          application/json:
            schema:
              $ref: "../schemas/system_user.yaml#/SystemUserResponse"
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: User not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
  delete:
    operationId: deleteSystemUser
    summary: Remove user from system
    description: Remove a user from a system
    tags:
      - SystemUser
    security:
      - sessionAuth: []
    parameters:
      - name: systemId
        in: path
        required: true
        schema:
          type: string
        description: System ID
      - name: uid
        in: path
        required: true
        schema:
          type: integer
          format: int32
        description: UNIX user ID
    responses:
      '204':
        description: User removed
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      '404':
        description: User not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
      default:
        description: Error
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/Error"
