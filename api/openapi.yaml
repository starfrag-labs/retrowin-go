openapi: 3.1.0
info:
  title: Retrowin API
  description: Retrowin File Management System API
  version: 0.1.0
  contact:
    name: StarFrag Lab

servers:
  - url: http://localhost:8080
    description: Development server

security:
  - sessionAuth: []

tags:
  - name: Health
    description: Health check endpoints
  - name: User
    description: User management endpoints
  - name: File
    description: File management endpoints
  - name: Upload
    description: File upload endpoints
  - name: Stream
    description: File streaming endpoints

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: retrowin_session
      description: Session-based authentication via cookie

  schemas:
    # Common
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
        details:
          type: object
          additionalProperties: true
          description: Additional error details

    Timestamp:
      type: string
      format: date-time
      description: ISO 8601 timestamp

    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          description: Health status
        version:
          type: string
          description: Application version

    # Provider type
    Provider:
      type: string
      enum:
        - keycloak
        - google
      description: Authentication provider

    # User schemas
    User:
      type: object
      required:
        - id
        - provider
        - providerId
      properties:
        id:
          type: integer
          format: int64
          description: User ID
        provider:
          $ref: '#/components/schemas/Provider'
        providerId:
          type: string
          description: User ID from the authentication provider
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'

    ServiceStatus:
      type: object
      required:
        - userId
        - available
      properties:
        userId:
          type: integer
          format: int64
          description: User ID
        available:
          type: boolean
          description: Service availability status
        joinDate:
          $ref: '#/components/schemas/Timestamp'
        updateDate:
          $ref: '#/components/schemas/Timestamp'

    CreateUserRequest:
      type: object
      required:
        - provider
        - providerId
      properties:
        provider:
          $ref: '#/components/schemas/Provider'
        providerId:
          type: string
          description: User ID from the authentication provider

    UserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/User'

    ServiceStatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/ServiceStatus'

    # File schemas
    FileType:
      type: string
      enum:
        - container
        - file
      description: Type of file (container or file)

    File:
      type: object
      required:
        - id
        - fileKey
        - type
        - fileName
      properties:
        id:
          type: integer
          format: int64
          description: File ID
        fileKey:
          type: string
          format: uuid
          description: File UUID key
        type:
          $ref: '#/components/schemas/FileType'
        fileName:
          type: string
          description: File name
        ownerId:
          type: integer
          format: int64
          description: Owner user ID
        parentId:
          type: integer
          format: int64
          nullable: true
          description: Parent file ID
        byteSize:
          type: integer
          format: int64
          description: File size in bytes
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
        path:
          type: array
          items:
            type: integer
            format: int64
          description: Path from root to this file
        roles:
          type: array
          items:
            type: string
          description: Current user's roles for this file

    CreateFileRequest:
      type: object
      required:
        - type
        - fileName
      properties:
        type:
          $ref: '#/components/schemas/FileType'
        fileName:
          type: string
          minLength: 1
          maxLength: 255
          description: File name
        parentKey:
          type: string
          format: uuid
          nullable: true
          description: Parent file key (container)

    UpdateFileRequest:
      type: object
      properties:
        fileName:
          type: string
          minLength: 1
          maxLength: 255
          description: New file name

    FileResponse:
      type: object
      required:
        - file
      properties:
        file:
          $ref: '#/components/schemas/File'

    FileListResponse:
      type: object
      required:
        - files
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/File'

    MoveFileRequest:
      type: object
      required:
        - targetKey
      properties:
        targetKey:
          type: string
          format: uuid
          description: Target container file key

    CopyFileRequest:
      type: object
      required:
        - targetKey
      properties:
        targetKey:
          type: string
          format: uuid
          description: Target container file key

    # Upload/Stream schemas
    UploadToken:
      type: object
      required:
        - token
        - uploadUrl
        - expiresAt
      properties:
        token:
          type: string
          description: Upload token for tracking
        uploadUrl:
          type: string
          format: uri
          description: Presigned S3 upload URL
        expiresAt:
          $ref: '#/components/schemas/Timestamp'

    UploadTokenResponse:
      type: object
      required:
        - uploadToken
      properties:
        uploadToken:
          $ref: '#/components/schemas/UploadToken'

    StreamToken:
      type: object
      required:
        - token
        - downloadUrl
        - expiresAt
      properties:
        token:
          type: string
          description: Stream token
        downloadUrl:
          type: string
          format: uri
          description: Presigned S3 download URL
        expiresAt:
          $ref: '#/components/schemas/Timestamp'

    StreamTokenResponse:
      type: object
      required:
        - streamToken
      properties:
        streamToken:
          $ref: '#/components/schemas/StreamToken'

    CompleteUploadRequest:
      type: object
      properties:
        byteSize:
          type: integer
          format: int64
          minimum: 0
          description: Final file size in bytes

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Check if the service is healthy
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  # User endpoints
  /user:
    get:
      operationId: getUser
      summary: Get current user
      description: Get the current user information based on x-uuid header
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      operationId: createUser
      summary: Create a new user
      description: Create a new user with the given UUID
      tags:
        - User
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      operationId: deleteUser
      summary: Delete user
      description: Delete the current user and all associated data
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '204':
          description: User deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/status:
    get:
      operationId: getServiceStatus
      summary: Get service status
      description: Get the service status for the current user
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatusResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # File endpoints
  /file/root:
    get:
      operationId: getRootContainer
      summary: Get root container
      description: Get the root container for the current user
      tags:
        - File
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Root container
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Root container not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/home:
    get:
      operationId: getHomeContainer
      summary: Get home container
      description: Get the home container for the current user
      tags:
        - File
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Home container
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Home container not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/trash:
    get:
      operationId: getTrashContainer
      summary: Get trash container
      description: Get the trash container for the current user
      tags:
        - File
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Trash container
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trash container not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/info/{fileKey}:
    get:
      operationId: getFileInfo
      summary: Get file information
      description: Get detailed information about a file
      tags:
        - File
      security:
        - sessionAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
      responses:
        '200':
          description: File information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/children/{fileKey}:
    get:
      operationId: getFileChildren
      summary: Get file children
      description: Get all children of a container
      tags:
        - File
      security:
        - sessionAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Container file key (UUID)
      responses:
        '200':
          description: List of children files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file:
    post:
      operationId: createFile
      summary: Create a new file or container
      description: Create a new file or container in a parent container
      tags:
        - File
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: File created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Parent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/{fileKey}:
    patch:
      operationId: updateFile
      summary: Update file metadata
      description: Update file name or other metadata
      tags:
        - File
      security:
        - sessionAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileRequest'
      responses:
        '200':
          description: File updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      operationId: deleteFile
      summary: Delete file
      description: Move file to trash or permanently delete
      tags:
        - File
      security:
        - sessionAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
        - name: permanent
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Permanently delete (bypass trash)
      responses:
        '204':
          description: File deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/{fileKey}/move:
    post:
      operationId: moveFile
      summary: Move file to another container
      description: Move a file to a different container
      tags:
        - File
      security:
        - sessionAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveFileRequest'
      responses:
        '200':
          description: File moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/{fileKey}/copy:
    post:
      operationId: copyFile
      summary: Copy file to another container
      description: Copy a file to a different container
      tags:
        - File
      security:
        - sessionAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyFileRequest'
      responses:
        '201':
          description: File copied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # Upload endpoints
  /file/upload/write-token/{fileKey}:
    get:
      operationId: getUploadToken
      summary: Get upload write token
      description: Get a presigned URL and token for uploading file content
      tags:
        - Upload
      security:
        - sessionAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
      responses:
        '200':
          description: Upload token generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadTokenResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /file/upload/complete/{fileKey}:
    patch:
      operationId: completeUpload
      summary: Complete file upload
      description: Mark file upload as complete and update metadata
      tags:
        - Upload
      security:
        - sessionAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteUploadRequest'
      responses:
        '200':
          description: Upload completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # Stream endpoints
  /file/stream/read-token/{fileKey}:
    get:
      operationId: getStreamToken
      summary: Get stream read token
      description: Get a presigned URL for downloading/streaming file content
      tags:
        - Stream
      security:
        - sessionAuth: []
      parameters:
        - name: fileKey
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File key (UUID)
      responses:
        '200':
          description: Stream token generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamTokenResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
