openapi: 3.1.0
info:
  title: Retrowin API
  description: Retrowin File Management System API
  version: 0.2.0
  contact:
    name: StarFrag Lab

servers:
  - url: http://localhost:8080
    description: Development server

security:
  - sessionAuth: []

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session_id
      description: Session-based authentication via cookie

  schemas:
    # Common schemas
    Error:
      $ref: "./schemas/common.yaml#/Error"
    UUID:
      $ref: "./schemas/common.yaml#/UUID"
    Timestamp:
      $ref: "./schemas/common.yaml#/Timestamp"
    HealthStatus:
      $ref: "./schemas/common.yaml#/HealthStatus"

    # Provider
    Provider:
      $ref: "./schemas/user.yaml#/Provider"

    # Auth schemas
    LoginResponse:
      $ref: "./schemas/auth.yaml#/LoginResponse"
    CallbackRequest:
      $ref: "./schemas/auth.yaml#/CallbackRequest"
    CallbackResponse:
      $ref: "./schemas/auth.yaml#/CallbackResponse"

    # User schemas
    User:
      $ref: "./schemas/user.yaml#/User"
    UserResponse:
      $ref: "./schemas/user.yaml#/UserResponse"

    # System schemas
    System:
      $ref: "./schemas/system.yaml#/System"
    CreateSystemRequest:
      $ref: "./schemas/system.yaml#/CreateSystemRequest"
    SystemResponse:
      $ref: "./schemas/system.yaml#/SystemResponse"
    SystemListResponse:
      $ref: "./schemas/system.yaml#/SystemListResponse"

    # SystemUser schemas
    SystemUser:
      $ref: "./schemas/system_user.yaml#/SystemUser"
    CreateSystemUserRequest:
      $ref: "./schemas/system_user.yaml#/CreateSystemUserRequest"
    SystemUserResponse:
      $ref: "./schemas/system_user.yaml#/SystemUserResponse"
    SystemUserListResponse:
      $ref: "./schemas/system_user.yaml#/SystemUserListResponse"

    # SystemGroup schemas
    SystemGroup:
      $ref: "./schemas/system_group.yaml#/SystemGroup"
    CreateSystemGroupRequest:
      $ref: "./schemas/system_group.yaml#/CreateSystemGroupRequest"
    SystemGroupResponse:
      $ref: "./schemas/system_group.yaml#/SystemGroupResponse"
    SystemGroupListResponse:
      $ref: "./schemas/system_group.yaml#/SystemGroupListResponse"

    # Inode schemas
    Inode:
      $ref: "./schemas/inode.yaml#/Inode"
    InodeResponse:
      $ref: "./schemas/inode.yaml#/InodeResponse"
    DirEntry:
      $ref: "./schemas/inode.yaml#/DirEntry"
    DirContentResponse:
      $ref: "./schemas/inode.yaml#/DirContentResponse"
    MkdirRequest:
      $ref: "./schemas/inode.yaml#/MkdirRequest"
    SymlinkRequest:
      $ref: "./schemas/inode.yaml#/SymlinkRequest"
    ChmodRequest:
      $ref: "./schemas/inode.yaml#/ChmodRequest"
    RenameRequest:
      $ref: "./schemas/inode.yaml#/RenameRequest"
    MoveRequest:
      $ref: "./schemas/inode.yaml#/MoveRequest"
    RmRequest:
      $ref: "./schemas/inode.yaml#/RmRequest"
    RmResult:
      $ref: "./schemas/inode.yaml#/RmResult"
    MvRequest:
      $ref: "./schemas/inode.yaml#/MvRequest"
    MvResult:
      $ref: "./schemas/inode.yaml#/MvResult"

    # Upload schemas
    InitiateUploadRequest:
      $ref: "./schemas/upload.yaml#/InitiateUploadRequest"
    UploadSession:
      $ref: "./schemas/upload.yaml#/UploadSession"
    UploadSessionResponse:
      $ref: "./schemas/upload.yaml#/UploadSessionResponse"
    CompleteUploadRequest:
      $ref: "./schemas/upload.yaml#/CompleteUploadRequest"
    DownloadURL:
      $ref: "./schemas/upload.yaml#/DownloadURL"
    DownloadURLResponse:
      $ref: "./schemas/upload.yaml#/DownloadURLResponse"

paths:
  # Auth endpoints
  /auth/login:
    $ref: "./paths/auth.yaml#/~1auth~1login"
  /auth/callback:
    $ref: "./paths/auth.yaml#/~1auth~1callback"
  /auth/logout:
    $ref: "./paths/auth.yaml#/~1auth~1logout"

  # Health
  /health:
    $ref: "./paths/health.yaml#/~1health"

  # User endpoints
  /user:
    $ref: "./paths/user.yaml#/~1user"

  # System endpoints
  /systems:
    $ref: "./paths/system.yaml#/~1systems"
  /systems/{systemId}:
    $ref: "./paths/system.yaml#/~1systems~1{systemId}"

  # SystemUser endpoints
  /systems/{systemId}/users:
    $ref: "./paths/system_user.yaml#/~1systems~1{systemId}~1users"
  /systems/{systemId}/users/{uid}:
    $ref: "./paths/system_user.yaml#/~1systems~1{systemId}~1users~1{uid}"

  # SystemGroup endpoints
  /systems/{systemId}/groups:
    $ref: "./paths/system_group.yaml#/~1systems~1{systemId}~1groups"
  /systems/{systemId}/groups/{gid}:
    $ref: "./paths/system_group.yaml#/~1systems~1{systemId}~1groups~1{gid}"
  /systems/{systemId}/groups/{gid}/members/{uid}:
    $ref: "./paths/system_group.yaml#/~1systems~1{systemId}~1groups~1{gid}~1members~1{uid}"

  # Fs endpoints (inode queries and attributes)
  /fs/{systemId}/root:
    $ref: "./paths/fs.yaml#/~1fs~1{systemId}~1root"
  /fs/{systemId}/stat:
    $ref: "./paths/fs.yaml#/~1fs~1{systemId}~1stat"
  /fs/{systemId}/chmod:
    $ref: "./paths/fs.yaml#/~1fs~1{systemId}~1chmod"

  # Syscall endpoints (dentry manipulation)
  /syscall/{systemId}/ls:
    $ref: "./paths/syscall.yaml#/~1syscall~1{systemId}~1ls"
  /syscall/{systemId}/mkdir:
    $ref: "./paths/syscall.yaml#/~1syscall~1{systemId}~1mkdir"
  /syscall/{systemId}/ln:
    $ref: "./paths/syscall.yaml#/~1syscall~1{systemId}~1ln"
  /syscall/{systemId}/rename:
    $ref: "./paths/syscall.yaml#/~1syscall~1{systemId}~1rename"
  /syscall/{systemId}/unlink:
    $ref: "./paths/syscall.yaml#/~1syscall~1{systemId}~1unlink"
  /syscall/{systemId}/rm:
    $ref: "./paths/syscall.yaml#/~1syscall~1{systemId}~1rm"
  /syscall/{systemId}/mv:
    $ref: "./paths/syscall.yaml#/~1syscall~1{systemId}~1mv"

  # Upload endpoints
  /fs/{systemId}/upload/initiate:
    $ref: "./paths/upload.yaml#/~1fs~1{systemId}~1upload~1initiate"
  /fs/{systemId}/upload/complete:
    $ref: "./paths/upload.yaml#/~1fs~1{systemId}~1upload~1complete"
  /fs/{systemId}/download:
    $ref: "./paths/upload.yaml#/~1fs~1{systemId}~1download"
