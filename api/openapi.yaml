openapi: 3.1.0
info:
  title: Retrowin API
  description: Retrowin File Management System API
  version: 0.1.0
  contact:
    name: StarFrag Lab

servers:
  - url: http://localhost:8080
    description: Development server

security:
  - sessionAuth: []

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: retrowin_session
      description: Session-based authentication via cookie

  schemas:
    # Common schemas
    Error:
      $ref: "./schemas/common.yaml#/Error"
    UUID:
      $ref: "./schemas/common.yaml#/UUID"
    Timestamp:
      $ref: "./schemas/common.yaml#/Timestamp"
    HealthStatus:
      $ref: "./schemas/common.yaml#/HealthStatus"

    # Provider
    Provider:
      $ref: "./schemas/user.yaml#/Provider"

    # Auth schemas
    LoginResponse:
      $ref: "./schemas/auth.yaml#/LoginResponse"
    CallbackRequest:
      $ref: "./schemas/auth.yaml#/CallbackRequest"
    CallbackResponse:
      $ref: "./schemas/auth.yaml#/CallbackResponse"

    # User schemas
    User:
      $ref: "./schemas/user.yaml#/User"
    CreateUserRequest:
      $ref: "./schemas/user.yaml#/CreateUserRequest"
    UserResponse:
      $ref: "./schemas/user.yaml#/UserResponse"

    # File schemas
    FileType:
      $ref: "./schemas/file.yaml#/FileType"
    File:
      $ref: "./schemas/file.yaml#/File"
    FileInfo:
      $ref: "./schemas/file.yaml#/FileInfo"
    CreateFileRequest:
      $ref: "./schemas/file.yaml#/CreateFileRequest"
    UpdateFileRequest:
      $ref: "./schemas/file.yaml#/UpdateFileRequest"
    FileResponse:
      $ref: "./schemas/file.yaml#/FileResponse"
    FileListResponse:
      $ref: "./schemas/file.yaml#/FileListResponse"
    UploadToken:
      $ref: "./schemas/file.yaml#/UploadToken"
    UploadTokenResponse:
      $ref: "./schemas/file.yaml#/UploadTokenResponse"
    StreamToken:
      $ref: "./schemas/file.yaml#/StreamToken"
    StreamTokenResponse:
      $ref: "./schemas/file.yaml#/StreamTokenResponse"
    CompleteUploadRequest:
      $ref: "./schemas/file.yaml#/CompleteUploadRequest"
    MoveFileRequest:
      $ref: "./schemas/file.yaml#/MoveFileRequest"
    CopyFileRequest:
      $ref: "./schemas/file.yaml#/CopyFileRequest"

paths:
  # Auth endpoints
  /auth/login:
    $ref: "./paths/auth.yaml#/~1auth~1login"
  /auth/callback:
    $ref: "./paths/auth.yaml#/~1auth~1callback"
  /auth/logout:
    $ref: "./paths/auth.yaml#/~1auth~1logout"

  # Health
  /health:
    $ref: "./paths/file.yaml#/~1health"

  # User endpoints
  /user:
    $ref: "./paths/user.yaml#/~1user"

  # File endpoints
  /file/root:
    $ref: "./paths/file.yaml#/~1file~1root"
  /file/home:
    $ref: "./paths/file.yaml#/~1file~1home"
  /file/trash:
    $ref: "./paths/file.yaml#/~1file~1trash"
  /file/info/{fileKey}:
    $ref: "./paths/file.yaml#/~1file~1info~1{fileKey}"
  /file/children/{fileKey}:
    $ref: "./paths/file.yaml#/~1file~1children~1{fileKey}"
  /file:
    $ref: "./paths/file.yaml#/~1file"
  /file/{fileKey}:
    $ref: "./paths/file.yaml#/~1file~1{fileKey}"
  /file/{fileKey}/move:
    $ref: "./paths/file.yaml#/~1file~1{fileKey}~1move"
  /file/{fileKey}/copy:
    $ref: "./paths/file.yaml#/~1file~1{fileKey}~1copy"

  # Upload endpoints
  /file/upload/write-token/{fileKey}:
    $ref: "./paths/upload.yaml#/~1file~1upload~1write-token~1{fileKey}"
  /file/upload/complete/{fileKey}:
    $ref: "./paths/upload.yaml#/~1file~1upload~1complete~1{fileKey}"

  # Stream endpoints
  /file/stream/read-token/{fileKey}:
    $ref: "./paths/upload.yaml#/~1file~1stream~1read-token~1{fileKey}"
