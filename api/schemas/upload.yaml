InitiateUploadRequest:
  type: object
  required:
    - path
    - size
  properties:
    path:
      type: string
      description: Target file path (e.g., /home/user/file.txt)
    contentType:
      type: string
      description: MIME content type
    size:
      type: integer
      format: int64
      minimum: 0
      description: File size in bytes

UploadSession:
  type: object
  required:
    - objectId
    - uploadUrl
    - expiresAt
  properties:
    objectId:
      type: string
      description: Object ID for tracking
    uploadUrl:
      type: string
      format: uri
      description: Presigned S3 upload URL
    expiresAt:
      $ref: './common.yaml#/Timestamp'

UploadSessionResponse:
  type: object
  required:
    - uploadSession
  properties:
    uploadSession:
      $ref: '#/UploadSession'

CompleteUploadRequest:
  type: object
  required:
    - objectId
    - path
  properties:
    objectId:
      type: string
      description: Object ID from upload initiation
    path:
      type: string
      description: Final file path
    mode:
      type: integer
      format: int32
      description: Optional file permissions

DownloadURL:
  type: object
  required:
    - downloadUrl
    - expiresAt
  properties:
    downloadUrl:
      type: string
      format: uri
      description: Presigned S3 download URL
    expiresAt:
      $ref: './common.yaml#/Timestamp'

DownloadURLResponse:
  type: object
  required:
    - downloadUrl
  properties:
    downloadUrl:
      $ref: '#/DownloadURL'
