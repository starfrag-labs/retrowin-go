LoginResponse:
  type: object
  required:
    - authorizationUrl
    - state
  properties:
    authorizationUrl:
      type: string
      format: uri
      description: Keycloak authorization URL
    state:
      type: string
      description: OAuth state parameter

CallbackRequest:
  type: object
  required:
    - code
    - state
  properties:
    code:
      type: string
      description: Authorization code from Keycloak
    state:
      type: string
      description: OAuth state parameter

CallbackResponse:
  type: object
  required:
    - sessionId
    - userId
  properties:
    sessionId:
      type: string
      description: Session ID for the authenticated user
    userId:
      type: string
      description: User ID
    expiresAt:
      $ref: './common.yaml#/Timestamp'

LogoutResponse:
  type: object
  required:
    - logoutUrl
  properties:
    logoutUrl:
      type: string
      description: Keycloak logout URL for RP-initiated logout. Empty if no SSO session exists.
