System:
  type: object
  required:
    - id
    - name
    - status
  properties:
    id:
      type: string
      description: System ID
    name:
      type: string
      description: System name
    description:
      type: string
      nullable: true
      description: System description
    status:
      type: string
      enum: [active, inactive, maintenance]
      description: System status
    createdAt:
      $ref: './common.yaml#/Timestamp'
    updatedAt:
      $ref: './common.yaml#/Timestamp'

CreateSystemRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
      description: System name
    description:
      type: string
      maxLength: 1000
      nullable: true
      description: System description

SystemResponse:
  type: object
  required:
    - system
  properties:
    system:
      $ref: '#/System'

SystemListResponse:
  type: object
  required:
    - systems
  properties:
    systems:
      type: array
      items:
        $ref: '#/System'
