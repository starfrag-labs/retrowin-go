components:
  schemas:
    User:
      type: object
      required:
        - id
        - uuidKey
      properties:
        id:
          type: integer
          format: int64
          description: User ID
        uuidKey:
          type: string
          format: uuid
          description: User UUID key
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'

    ServiceStatus:
      type: object
      required:
        - userId
        - available
      properties:
        userId:
          type: integer
          format: int64
          description: User ID
        available:
          type: boolean
          description: Service availability status
        joinDate:
          $ref: '#/components/schemas/Timestamp'
        updateDate:
          $ref: '#/components/schemas/Timestamp'

    CreateUserRequest:
      type: object
      required:
        - uuidKey
      properties:
        uuidKey:
          type: string
          format: uuid
          description: User UUID key

    UserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/User'

    ServiceStatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/ServiceStatus'
