Provider:
  type: string
  enum:
    - keycloak
    - google
  description: Authentication provider

User:
  type: object
  required:
    - id
    - provider
    - providerId
  properties:
    id:
      type: integer
      format: int64
      description: User ID
    provider:
      $ref: '#/Provider'
    providerId:
      type: string
      description: User ID from the authentication provider
    createdAt:
      $ref: './common.yaml#/Timestamp'
    updatedAt:
      $ref: './common.yaml#/Timestamp'

ServiceStatus:
  type: object
  required:
    - userId
    - available
  properties:
    userId:
      type: integer
      format: int64
      description: User ID
    available:
      type: boolean
      description: Service availability status
    joinDate:
      $ref: './common.yaml#/Timestamp'
    updateDate:
      $ref: './common.yaml#/Timestamp'

CreateUserRequest:
  type: object
  required:
    - provider
    - providerId
  properties:
    provider:
      $ref: '#/Provider'
    providerId:
      type: string
      description: User ID from the authentication provider

UserResponse:
  type: object
  required:
    - user
  properties:
    user:
      $ref: '#/User'

ServiceStatusResponse:
  type: object
  required:
    - status
  properties:
    status:
      $ref: '#/ServiceStatus'
