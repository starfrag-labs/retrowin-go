Provider:
  type: string
  enum:
    - keycloak
    - google
  description: Authentication provider

User:
  type: object
  required:
    - id
    - provider
    - providerId
  properties:
    id:
      type: integer
      format: int64
      description: User ID
    provider:
      $ref: '#/Provider'
    providerId:
      type: string
      description: User ID from the authentication provider
    joinDate:
      $ref: './common.yaml#/Timestamp'
    createdAt:
      $ref: './common.yaml#/Timestamp'
    updatedAt:
      $ref: './common.yaml#/Timestamp'

CreateUserRequest:
  type: object
  required:
    - provider
    - providerId
  properties:
    provider:
      $ref: '#/Provider'
    providerId:
      type: string
      description: User ID from the authentication provider

UserResponse:
  type: object
  required:
    - user
  properties:
    user:
      $ref: '#/User'
