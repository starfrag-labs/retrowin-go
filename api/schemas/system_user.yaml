SystemUser:
  type: object
  required:
    - id
    - userId
    - systemId
    - username
    - uid
    - gid
  properties:
    id:
      type: integer
      format: int64
      description: SystemUser record ID
    userId:
      type: string
      description: External user ID
    systemId:
      type: string
      description: System ID
    username:
      type: string
      description: Username within the system
    uid:
      type: integer
      format: int32
      description: UNIX user ID
    gid:
      type: integer
      format: int32
      description: Primary group ID (typically equals UID for private group)
    createdAt:
      $ref: './common.yaml#/Timestamp'

CreateSystemUserRequest:
  type: object
  required:
    - userId
    - username
  properties:
    userId:
      type: string
      description: External user ID
    username:
      type: string
      minLength: 1
      maxLength: 255
      description: Username within the system
    uid:
      type: integer
      format: int32
      minimum: -1
      description: |
        Optional UNIX user ID.
        - -1 or omitted: Auto-assigned (starts from 1000)
        - 0: Root user (superuser) - requires special privileges
        - 1-999: Reserved for system users
        - 1000-65533: Regular users

SystemUserResponse:
  type: object
  required:
    - user
  properties:
    user:
      $ref: '#/SystemUser'

SystemUserListResponse:
  type: object
  required:
    - users
  properties:
    users:
      type: array
      items:
        $ref: '#/SystemUser'
