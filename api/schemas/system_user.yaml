SystemUser:
  type: object
  required:
    - id
    - userId
    - systemId
    - username
    - uid
    - gid
  properties:
    id:
      type: integer
      format: int64
      description: SystemUser record ID
    userId:
      type: string
      description: External user ID
    systemId:
      type: string
      description: System ID
    username:
      type: string
      description: Username within the system
    uid:
      type: integer
      format: int32
      description: UNIX user ID
    gid:
      type: integer
      format: int32
      description: Primary group ID
    createdAt:
      $ref: './common.yaml#/Timestamp'

CreateSystemUserRequest:
  type: object
  required:
    - userId
    - username
  properties:
    userId:
      type: string
      description: External user ID
    username:
      type: string
      minLength: 1
      maxLength: 255
      description: Username within the system
    uid:
      type: integer
      format: int32
      minimum: 0
      description: Optional UID (auto-assigned if 0 or not provided)

SystemUserResponse:
  type: object
  required:
    - user
  properties:
    user:
      $ref: '#/SystemUser'

SystemUserListResponse:
  type: object
  required:
    - users
  properties:
    users:
      type: array
      items:
        $ref: '#/SystemUser'
