SystemGroup:
  type: object
  required:
    - id
    - systemId
    - name
    - gid
  properties:
    id:
      type: integer
      format: int64
      description: SystemGroup record ID
    systemId:
      type: string
      description: System ID
    name:
      type: string
      description: Group name
    gid:
      type: integer
      format: int32
      description: UNIX group ID
    members:
      type: array
      items:
        type: integer
        format: int64
      description: List of SystemUser IDs in this group
    createdAt:
      $ref: './common.yaml#/Timestamp'

CreateSystemGroupRequest:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
      description: Group name
    gid:
      type: integer
      format: int32
      minimum: 0
      description: Optional GID (auto-assigned if 0 or not provided)

SystemGroupResponse:
  type: object
  required:
    - group
  properties:
    group:
      $ref: '#/SystemGroup'

SystemGroupListResponse:
  type: object
  required:
    - groups
  properties:
    groups:
      type: array
      items:
        $ref: '#/SystemGroup'
