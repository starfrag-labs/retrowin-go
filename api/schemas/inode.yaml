Inode:
  type: object
  required:
    - id
    - systemId
    - mode
    - uid
    - gid
    - size
    - linkCount
    - flags
  properties:
    id:
      type: string
      description: Inode ID
    systemId:
      type: string
      description: System ID
    mode:
      type: integer
      format: int32
      description: |
        File mode (file type + permissions), same as Linux mode_t.

        File types (upper 4 bits, use bitwise AND with 0170000):
        - 0140000 (S_IFDIR): Directory
        - 0100000 (S_IFREG): Regular file
        - 0120000 (S_IFLNK): Symbolic link
        - 0010000 (S_IFIFO): Named pipe (FIFO)
        - 0020000 (S_IFCHR): Character device
        - 0060000 (S_IFBLK): Block device
        - 0110000 (S_IFSOCK): Socket

        Special bits (bits 9-11):
        - 04000 (S_ISUID): Set-user-ID (run with owner's UID)
        - 02000 (S_ISGID): Set-group-ID (run with group's GID)
        - 01000 (S_ISVTX): Sticky bit (only owner can delete in dir)

        Permissions (lower 9 bits):
        - 0700: Owner (rwx) - read, write, execute
        - 0070: Group (rwx) - read, write, execute
        - 0007: Others (rwx) - read, write, execute

        Examples:
        - 040755: Directory, rwxr-xr-x (755)
        - 0100644: Regular file, rw-r--r-- (644)
        - 0100755: Executable file, rwxr-xr-x (755)
    uid:
      type: integer
      format: int32
      description: |
        Owner user ID (UNIX UID).
        - 0: root (superuser)
        - 1-999: system users
        - 1000+: regular users
    gid:
      type: integer
      format: int32
      description: |
        Owner group ID (UNIX GID).
        Typically matches UID for user's private group.
    size:
      type: integer
      format: int64
      description: File size in bytes
    linkCount:
      type: integer
      format: int32
      description: Number of hard links
    flags:
      type: integer
      format: int32
      description: Inode flags
    atime:
      $ref: './common.yaml#/Timestamp'
    mtime:
      $ref: './common.yaml#/Timestamp'
    ctime:
      $ref: './common.yaml#/Timestamp'
    createdAt:
      $ref: './common.yaml#/Timestamp'

InodeResponse:
  type: object
  required:
    - inode
  properties:
    inode:
      $ref: '#/Inode'

DirEntry:
  type: object
  required:
    - name
    - inodeId
    - fileType
  properties:
    name:
      type: string
      description: Entry name
    inodeId:
      type: string
      description: Inode ID
    fileType:
      type: integer
      format: int32
      description: File type (upper 4 bits of mode)

DirContentResponse:
  type: object
  required:
    - entries
  properties:
    entries:
      type: array
      items:
        $ref: '#/DirEntry'

MkdirRequest:
  type: object
  required:
    - path
  properties:
    path:
      type: string
      description: Directory path to create
    mode:
      type: integer
      format: int32
      description: |
        Directory permissions (default: 0755).
        Only permission bits (0777) are used; file type is automatically set to directory.
        Common values:
        - 0755: rwxr-xr-x (default, world-readable)
        - 0700: rwx------ (private, owner only)
        - 0775: rwxrwxr-x (group writable)

SymlinkRequest:
  type: object
  required:
    - target
    - linkPath
  properties:
    target:
      type: string
      description: Target path
    linkPath:
      type: string
      description: Link path

ChmodRequest:
  type: object
  required:
    - path
    - mode
  properties:
    path:
      type: string
      description: File path
    mode:
      type: integer
      format: int32
      description: |
        New permission bits (only lower 12 bits used).
        File type bits are preserved; only permissions are changed.

        Common values:
        - 0755: rwxr-xr-x (executable/script)
        - 0644: rw-r--r-- (regular file)
        - 0600: rw------- (private file)
        - 0700: rwx------ (private directory)

RenameRequest:
  type: object
  required:
    - path
    - newName
  properties:
    path:
      type: string
      description: Current path of the file/directory to rename
    newName:
      type: string
      description: New name (without path, just the filename)

MoveRequest:
  type: object
  required:
    - path
    - destination
  properties:
    path:
      type: string
      description: Current path of the file/directory to move
    destination:
      type: string
      description: |
        Destination path. Can be:
        - A directory path (file keeps its name): /home/user/docs
        - A full new path (file gets renamed): /home/user/docs/new.txt

RmRequest:
  type: object
  required:
    - paths
  properties:
    paths:
      type: array
      items:
        type: string
      description: List of paths to remove
      minItems: 1

RmResult:
  type: object
  properties:
    deleted:
      type: array
      items:
        type: string
      description: Successfully deleted paths
    errors:
      type: array
      items:
        $ref: '#/RmError'

RmError:
  type: object
  required:
    - path
    - error
  properties:
    path:
      type: string
    error:
      type: string

MvRequest:
  type: object
  required:
    - sources
    - destination
  properties:
    sources:
      type: array
      items:
        type: string
      description: List of source paths to move
      minItems: 1
    destination:
      type: string
      description: |
        Destination path. Can be:
        - A directory path (files keep their names): /home/user/docs
        - A full new path (single source only): /home/user/docs/new.txt

MvResult:
  type: object
  properties:
    moved:
      type: array
      items:
        type: string
      description: Successfully moved paths
    errors:
      type: array
      items:
        $ref: '#/MvError'

MvError:
  type: object
  required:
    - path
    - error
  properties:
    path:
      type: string
    error:
      type: string
