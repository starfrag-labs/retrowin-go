Error:
  type: object
  required:
    - error
  properties:
    error:
      type: object
      required:
        - type
        - message
      properties:
        type:
          type: string
          description: Error type
        message:
          type: string
          description: Error message

UUID:
  type: string
  format: uuid
  description: UUID format string

Timestamp:
  type: string
  format: date-time
  description: ISO 8601 timestamp

HealthStatus:
  type: object
  required:
    - status
  properties:
    status:
      type: string
      enum: [healthy, unhealthy]
      description: Health status
    version:
      type: string
      description: Application version
