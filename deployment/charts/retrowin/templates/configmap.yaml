apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "retrowin.fullname" . }}
  labels:
    {{- include "retrowin.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-weight: "-1"
data:
  config.yaml: |
{{ .Values.config | toYaml | nindent 4 }}
