{{- if .Values.gc.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "retrowin.fullname" . }}-gc
  labels:
    {{- include "retrowin.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.gc.schedule | quote }}
  concurrencyPolicy: {{ .Values.gc.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.gc.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.gc.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      backoffLimit: 3
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            {{- include "retrowin.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "retrowin.serviceAccountName" . }}
          automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: gc
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              image: {{ include "retrowin.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args:
                - gc
                - run
                - --config
                - /app/config/config.yaml
                - --pending-expiry
                - {{ .Values.gc.pendingExpiry | quote }}
              env:
                {{- if or .Values.secrets.database.password .Values.secrets.database.existingSecret }}
                - name: DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secrets.database.existingSecret | default (include "retrowin.fullname" .) }}
                      key: {{ .Values.secrets.database.existingSecretKey | default "database-password" }}
                {{- end }}
                {{- if or .Values.secrets.storage.accessKey .Values.secrets.storage.existingSecret }}
                - name: STORAGE_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secrets.storage.existingSecret | default (include "retrowin.fullname" .) }}
                      key: storage-access-key
                - name: STORAGE_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secrets.storage.existingSecret | default (include "retrowin.fullname" .) }}
                      key: storage-secret-key
                {{- end }}
              volumeMounts:
                - name: config
                  mountPath: /app/config
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                {{- toYaml .Values.gc.resources | nindent 16 }}
          volumes:
            - name: config
              configMap:
                name: {{ include "retrowin.fullname" . }}
            - name: tmp
              emptyDir: {}
{{- end }}
