apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retrowin.fullname" . }}
  labels:
    {{- include "retrowin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "retrowin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "retrowin.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "retrowin.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "retrowin.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --config
            - /app/config/config.yaml
          env:
            # Database password override (from secret)
            {{- if or .Values.secrets.database.password .Values.secrets.database.existingSecret }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.database.existingSecret | default (include "retrowin.fullname" .) }}
                  key: {{ .Values.secrets.database.existingSecretKey | default "database-password" }}
            {{- end }}
            # Valkey password override (from secret)
            {{- if or .Values.secrets.cache.valkey.password .Values.secrets.cache.valkey.existingSecret }}
            - name: CACHE_VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.cache.valkey.existingSecret | default (include "retrowin.fullname" .) }}
                  key: {{ .Values.secrets.cache.valkey.existingSecretKey | default "valkey-password" }}
            {{- end }}
            # Storage secrets
            {{- if or .Values.secrets.storage.accessKey .Values.secrets.storage.existingSecret }}
            - name: STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.storage.existingSecret | default (include "retrowin.fullname" .) }}
                  key: storage-access-key
            {{- end }}
            {{- if or .Values.secrets.storage.secretKey .Values.secrets.storage.existingSecret }}
            - name: STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.storage.existingSecret | default (include "retrowin.fullname" .) }}
                  key: storage-secret-key
            {{- end }}
            # Keycloak client secret (from secret)
            {{- if .Values.config.auth.keycloak.baseURL }}
            {{- if or .Values.secrets.keycloak.clientSecret .Values.secrets.keycloak.existingSecret }}
            - name: AUTH_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.keycloak.existingSecret | default (include "retrowin.fullname" .) }}
                  key: {{ .Values.secrets.keycloak.existingSecretKey | default "keycloak-client-secret" }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.http.port }}
              protocol: TCP
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "retrowin.fullname" . }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
