# Pull Request workflow for retrowin-go
name: Pull Request

on:
  pull_request:
    branches:
      - master
      - main
      - develop

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  go-ci:
    name: Go CI
    uses: mandacode-lab/workflows/.github/workflows/go-ci.yml@v0.2.0
    with:
      go-version: "1.26.1"
      enable-coverage: true
      coverage-threshold: 0
      enable-security-scan: true

  docker-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: go-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/server.Dockerfile
          push: false
          tags: retrowin-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-test:
    name: Helm Chart Test
    runs-on: ubuntu-latest
    needs: go-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint deployment/charts/retrowin

      - name: Template chart
        run: helm template test-release deployment/charts/retrowin --debug
