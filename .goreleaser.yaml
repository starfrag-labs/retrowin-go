version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: retrowin-server
    main: ./cmd/retrowin-server
    binary: retrowin-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: retrowin-server
    builds:
      - retrowin-server
    name_template: "retrowin-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - none*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
